# Kickstart configuration for bootc ISO
# This configures SSH access and basic settings

# Root password (change this!)
# Using pre-hashed password for "bootc" 
# To generate: openssl passwd -1

# Network configuration
network --bootproto=dhcp --onboot=on --activate

# Enable SSH
services --enabled=sshd

# Add authorized SSH keys
sshkey --user=root "PLACEHOLDER_SSH_KEY"

# Packages to install
%packages
openssh-server
openssh-clients
%end

# Run commands after installation
%post --erroronfail
# Enable and start SSH
systemctl enable sshd
systemctl start sshd

# Configure SSH for root login with password (for testing only!)
echo "PermitRootLogin yes" >> /etc/ssh/sshd_config.d/01-permit-root-login.conf
echo "PasswordAuthentication yes" >> /etc/ssh/sshd_config.d/02-password-auth.conf

# Set root password (change in production!)
echo "root:bootc" | chpasswd
%end
